name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  demoapp001-typescript-cypress:
    name: DEMOAPP001 TypeScript Cypress
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: demo-apps/demoapp001-typescript-cypress/package-lock.json

      - name: Install dependencies
        working-directory: demo-apps/demoapp001-typescript-cypress
        run: npm ci

      - name: Build
        working-directory: demo-apps/demoapp001-typescript-cypress
        run: npm run build

      - name: Lint
        working-directory: demo-apps/demoapp001-typescript-cypress
        run: npm run lint

      - name: API integration tests
        working-directory: demo-apps/demoapp001-typescript-cypress
        run: npm run test:api

      - name: Test
        working-directory: demo-apps/demoapp001-typescript-cypress
        run: npm test

      - name: Memory key parity
        shell: pwsh
        run: ./.batch/check-memory-key-parity.ps1

      - name: Feature parity
        shell: pwsh
        run: ./.batch/generate-feature-parity-report.ps1

      - name: Step text parity
        shell: pwsh
        run: ./.batch/check-step-text-parity.ps1

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: demoapp001-validation-results
          path: .results/
          if-no-files-found: ignore

  demoapp002-python-pytest:
    name: DEMOAPP002 Python Pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: demo-apps/demoapp002-python-pytest/pyproject.toml

      - name: Install dependencies
        working-directory: demo-apps/demoapp002-python-pytest
        run: python -m pip install -e ".[test]"

      - name: Test
        working-directory: demo-apps/demoapp002-python-pytest
        run: python -m pytest

  demoapp003-csharp-specflow:
    name: DEMOAPP003 C# SpecFlow
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        working-directory: demo-apps/demoapp003-csharp-specflow
        run: dotnet restore

      - name: Test
        working-directory: demo-apps/demoapp003-csharp-specflow
        run: dotnet test --no-restore
