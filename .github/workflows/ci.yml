name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  demoapp001-typescript-cypress:
    name: DEMOAPP001 TypeScript Cypress
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: demo-apps/demoapp001-typescript-cypress/package-lock.json

      - name: Install dependencies
        working-directory: demo-apps/demoapp001-typescript-cypress
        run: npm ci

      - name: Build
        working-directory: demo-apps/demoapp001-typescript-cypress
        run: npm run build

      - name: Lint
        working-directory: demo-apps/demoapp001-typescript-cypress
        run: npm run lint

      - name: Check formatting
        working-directory: demo-apps/demoapp001-typescript-cypress
        run: npm run format:check

      - name: API integration tests
        working-directory: demo-apps/demoapp001-typescript-cypress
        run: npm run test:api

      - name: Test
        working-directory: demo-apps/demoapp001-typescript-cypress
        run: npm test

      - name: RA header currency
        shell: pwsh
        run: ./.batch/check-ra-header-currency.ps1

      - name: Memory key parity
        shell: pwsh
        run: ./.batch/check-memory-key-parity.ps1

      - name: Feature parity
        shell: pwsh
        run: ./.batch/generate-feature-parity-report.ps1

      - name: Step text parity
        shell: pwsh
        run: ./.batch/check-step-text-parity.ps1

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: demoapp001-validation-results
          path: .results/
          if-no-files-found: ignore
          retention-days: 7

  demoapp002-python-pytest:
    name: DEMOAPP002 Python Pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            demo-apps/demoapp002-python-pytest/pyproject.toml
            demo-apps/demoapp002-python-pytest/requirements-test.lock

      - name: Install dependencies
        working-directory: demo-apps/demoapp002-python-pytest
        run: python -m pip install -c requirements-test.lock -e ".[test]"

      - name: Test
        working-directory: demo-apps/demoapp002-python-pytest
        run: python -m pytest

  demoapp003-csharp-specflow:
    name: DEMOAPP003 C# Reqnroll
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        working-directory: demo-apps/demoapp003-csharp-specflow
        run: dotnet restore --locked-mode

      - name: Test
        working-directory: demo-apps/demoapp003-csharp-specflow
        run: dotnet test --no-restore

  gate:
    name: Gate (all stacks green)
    runs-on: ubuntu-latest
    needs:
      - demoapp001-typescript-cypress
      - demoapp002-python-pytest
      - demoapp003-csharp-specflow

    steps:
      - name: All stacks green
        run: echo "all stacks green"
