name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  step-text-parity:
    name: Step text parity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run step text parity gate
        shell: pwsh
        run: ./.batch/check-step-text-parity.ps1
